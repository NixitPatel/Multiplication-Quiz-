<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz App</title>
  <style>
    :root{
      --bg:#eef2f3;
      --card:#ffffff;
      --text:#111;
      --muted:#666;
      --correct:#28a745;
      --wrong:#dc3545;
      --btn:#2d6cdf;
    }body.dark{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#f1f5f9;
  --muted:#cbd5e1;
  --btn:#3b82f6;
}

body{
  font-family: Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
  transition:0.3s;
  padding:10px;
}

.container{
  background:var(--card);
  width:100%;
  max-width:420px;
  border-radius:16px;
  padding:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{text-align:center;margin:10px 0;}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.theme-btn{
  padding:6px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:var(--btn);
  color:white;
}

.section{
  text-align:left;
  margin:10px 0;
  padding:10px;
  background:rgba(0,0,0,0.05);
  border-radius:10px;
}

body.dark .section{background:rgba(255,255,255,0.05);}

label{display:block;margin:5px 0;cursor:pointer;}

.btn{
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:var(--btn);
  color:white;
  font-weight:bold;
}

.stop{background:var(--wrong);}

.quiz{display:none;}

.question-box{
  font-size:22px;
  text-align:center;
  margin:10px 0;
  font-weight:bold;
}

.option{
  background:rgba(0,0,0,0.08);
  margin:6px 0;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  text-align:center;
}

body.dark .option{background:rgba(255,255,255,0.08);}

.correct{background:var(--correct)!important;color:white;}
.wrong{background:var(--wrong)!important;color:white;}

.feedback-box{
  min-height:40px;
  margin:10px 0;
  text-align:center;
  font-weight:bold;
  padding:8px;
  border-radius:8px;
}

.correct-msg{background:#d4edda;color:#155724;}
.wrong-msg{background:#f8d7da;color:#721c24;}

@media(max-width:480px){
  .container{border-radius:0;height:100vh;}
}

  </style>
</head>
<body><div class="container">  <div class="topbar">
    <h3>Quiz App</h3>
    <button class="theme-btn" onclick="toggleTheme()">🌙</button>
  </div>  <div id="menu"><div class="section">
  <b>✖ Multiplication</b>
  <label><input type="checkbox" value="mul-1-10"> 1 - 10</label>
  <label><input type="checkbox" value="mul-11-20"> 11 - 20</label>
  <label><input type="checkbox" value="mul-21-30"> 21 - 30</label>
</div>

<div class="section">
  <b>🔢 Square</b>
  <label><input type="checkbox" value="square-1-10"> 1 - 10</label>
  <label><input type="checkbox" value="square-11-20"> 11 - 20</label>
  <label><input type="checkbox" value="square-21-30"> 21 - 30</label>
</div>

<div class="section">
  <b>🔢 Cube</b>
  <label><input type="checkbox" value="cube-1-10"> 1 - 10</label>
  <label><input type="checkbox" value="cube-11-20"> 11 - 20</label>
  <label><input type="checkbox" value="cube-21-30"> 21 - 30</label>
</div>

<button class="btn" onclick="startQuiz()">Play</button>

  </div>  <div id="quiz" class="quiz">
    <div id="feedback" class="feedback-box"></div>
    <div class="question-box" id="question"></div>
    <div id="options"></div>
    <button class="btn stop" onclick="stopQuiz()">Stop</button>
  </div>
</div><script>
let selections=[],used=new Set(),ans=0;

function key(t,a,b=0){return t+"-"+a+"-"+b;}

function startQuiz(){
  let s=document.querySelectorAll('#menu input:checked');
  if(!s.length)return alert('Select options');

  selections=[...s].map(x=>x.value);
  used.clear();

  document.getElementById('menu').style.display='none';
  document.getElementById('quiz').style.display='block';

  next();
}

function stopQuiz(){
  document.getElementById('menu').style.display='block';
  document.getElementById('quiz').style.display='none';
}

function next(){
  let fb=document.getElementById('feedback');
  fb.className='feedback-box';
  fb.innerText='';

  let t,mx,mn,a,b,q,k,tries=0;

  do{
    let p=selections[Math.floor(Math.random()*selections.length)];
    [t,mn,mx]=p.split('-');

    a=Math.floor(Math.random()*(+mx-+mn+1))+ +mn;

    if(t==='square'){
      ans=a*a;
      q=`${a}² = ?`;
      k=key('square',a);
    }else if(t==='cube'){
      ans=a*a*a;
      q=`${a}³ = ?`;
      k=key('cube',a);
    }else{
      a=Math.max(2,a);
      b=Math.floor(Math.random()*9)+2;
      ans=a*b;
      q=`${a} × ${b} = ?`;
      k=key('mul',a,b);
    }

    tries++;
    if(tries>60)break;

  }while(used.has(k));

  used.add(k);

  document.getElementById('question').innerText=q;

  let opt=[ans];
  while(opt.length<4){
    let w=ans+Math.floor(Math.random()*20-10);
    if(w>0&&!opt.includes(w))opt.push(w);
  }

  opt.sort(()=>Math.random()-0.5);

  document.getElementById('options').innerHTML=
    opt.map(x=>`<div class='option' onclick='check(this,${x})'>${x}</div>`).join('');
}

function check(el,v){
  let fb=document.getElementById('feedback');

  if(v===ans){
    el.classList.add('correct');
    fb.classList.add('correct-msg');
    fb.innerText='Correct 🎉';
    setTimeout(next,700);
  }else{
    el.classList.add('wrong');
    fb.classList.add('wrong-msg');
    fb.innerText='Wrong ❌';
  }
}

function toggleTheme(){
  document.body.classList.toggle('dark');
}
</script></body>
</html>
